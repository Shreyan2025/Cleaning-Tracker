<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Cleaning Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: #ffffff;
      --text: #142033;
      --muted: #6b778c;
      --line: rgba(20, 32, 51, 0.08);
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.06);
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.12);
      --success: #16a34a;
      --success-soft: rgba(22, 163, 74, 0.12);
      --warm: #f59e0b;
      --warm-soft: rgba(245, 158, 11, 0.14);
      --danger: #ef4444;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(16,185,129,0.10), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, #f4f7fb 100%);
      color: var(--text);
    }

    body { padding: 24px 16px 40px; }

    .shell {
      max-width: 520px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, #0f172a 0%, #1e3a8a 62%, #2563eb 100%);
      color: white;
      border-radius: 32px;
      padding: 24px 22px;
      box-shadow: 0 20px 44px rgba(30, 58, 138, 0.30);
      margin-bottom: 18px;
    }

    .hero::before,
    .hero::after {
      content: '';
      position: absolute;
      border-radius: 999px;
      opacity: 0.18;
      pointer-events: none;
    }

    .hero::before {
      width: 180px;
      height: 180px;
      right: -56px;
      top: -56px;
      background: white;
    }

    .hero::after {
      width: 120px;
      height: 120px;
      right: 40px;
      bottom: -50px;
      background: #93c5fd;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(8px);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #86efac;
      box-shadow: 0 0 0 6px rgba(134, 239, 172, 0.18);
    }

    .hero h1 {
      margin: 14px 0 8px;
      font-size: clamp(28px, 6vw, 38px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .hero-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.82);
      line-height: 1.5;
      max-width: 300px;
    }

    .hero-meta {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(14px);
      border-radius: 20px;
      padding: 14px;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: white;
    }

    .panel {
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      padding: 18px;
      margin-bottom: 16px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-title-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .icon-chip {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .icon-blue { background: var(--accent-soft); }
    .icon-green { background: var(--success-soft); }
    .icon-amber { background: var(--warm-soft); }

    .panel h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill-success {
      color: var(--success);
      background: var(--success-soft);
    }

    .pill-accent {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .date-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0 14px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .date-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      min-width: 72px;
    }

    input[type="date"] {
      width: 100%;
      border: 0;
      background: transparent;
      outline: none;
      font: inherit;
      color: var(--text);
      font-weight: 600;
    }

    .queue-list {
      display: grid;
      gap: 10px;
    }

    .queue-item {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      cursor: pointer;
    }

    .queue-item:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-soft);
      border-color: rgba(59,130,246,0.18);
    }

    .queue-item.next-up {
      background: linear-gradient(135deg, rgba(22,163,74,0.10), rgba(255,255,255,0.88));
      border-color: rgba(22,163,74,0.20);
    }

    .person {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .rank {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 800;
      font-size: 13px;
      flex-shrink: 0;
    }

    .next-up .rank {
      background: rgba(22,163,74,0.14);
      color: var(--success);
    }

    .person-name {
      font-weight: 700;
      font-size: 15px;
      line-height: 1.1;
    }

    .helper {
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .next-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      color: var(--success);
      background: rgba(22,163,74,0.12);
    }

    .radio-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .radio-wrap input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .radio-ui {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 2px solid rgba(59,130,246,0.32);
      background: white;
      display: inline-block;
      box-shadow: inset 0 0 0 5px white;
      transition: all 0.18s ease;
    }

    .queue-item:hover .radio-ui,
    .queue-item:focus-within .radio-ui {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 5px white, 0 0 0 6px rgba(59,130,246,0.12);
    }

    .last-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(15,23,42,0.04);
      color: var(--muted);
      font-size: 13px;
    }

    .last-line strong {
      color: var(--text);
    }

    .footer-actions {
      position: sticky;
      bottom: 16px;
      z-index: 10;
    }

    .reset-btn {
      width: 100%;
      border: 0;
      border-radius: 22px;
      padding: 16px 18px;
      font: inherit;
      font-weight: 800;
      font-size: 15px;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
      box-shadow: 0 18px 30px rgba(17, 24, 39, 0.22);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .reset-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 34px rgba(17, 24, 39, 0.28);
    }

    .note {
      text-align: center;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .loading {
      min-height: 70vh;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 600;
    }

    .loading-card {
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 22px 24px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid rgba(59,130,246,0.2);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      body { padding-left: 12px; padding-right: 12px; }
      .hero { padding: 22px 18px; border-radius: 28px; }
      .panel { padding: 16px; }
      .hero-meta { grid-template-columns: 1fr; }
      .panel-head { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="shell" id="app">
    <div class="loading">
      <div class="loading-card">
        <div class="spinner"></div>
        <div>Loading your shared cleaning tracker...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, doc, onSnapshot, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCPut9Vi9mQon2r4YDNBfWaiIve-MP-NkM",
      authDomain: "cleaning-tracker-aa9f1.firebaseapp.com",
      projectId: "cleaning-tracker-aa9f1",
      storageBucket: "cleaning-tracker-aa9f1.firebasestorage.app",
      messagingSenderId: "470636765005",
      appId: "1:470636765005:web:dbcc92d69f13e9626ee104",
      measurementId: "G-WWEJNFQHDY"
    };

    const DEFAULT_USERS = ['Shreyan', 'Himanshi', 'Ayushi', 'Sarvanan'];
    const ADMIN_NAME = 'Shreyan';
    const RESET_PIN = '2468'; // change this to your own private PIN
    const DEFAULT_TASKS = [
      { id: 'living-room', name: 'Living Room Cleaning', icon: '🛋️' },
      { id: 'house', name: 'House Cleaning', icon: '🏠' },
      { id: 'mopping', name: 'Mopping', icon: '🧼' },
      { id: 'dusting', name: 'Dusting', icon: '✨' },
    ];

    const appEl = document.getElementById('app');
    const DOC_PATH = ['household', 'weekly-cleaning-tracker'];

    function getStartOfWeek(date = new Date()) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + diff);
      return d;
    }

    function formatDate(date) {
      return new Intl.DateTimeFormat('en-IE', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      }).format(date);
    }

    function formatDateInputValue(date) {
      const year = date.getFullYear();
      const month = `${date.getMonth() + 1}`.padStart(2, '0');
      const day = `${date.getDate()}`.padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function weekRangeLabel(startDate) {
      const end = new Date(startDate);
      end.setDate(end.getDate() + 6);
      return `${formatDate(startDate)} – ${formatDate(end)}`;
    }

    function createInitialState() {
      const today = formatDateInputValue(new Date());
      return {
        weekStart: getStartOfWeek().toISOString(),
        cleaningQueues: DEFAULT_TASKS.reduce((acc, task) => {
          acc[task.id] = {
            name: task.name,
            icon: task.icon,
            queue: [...DEFAULT_USERS],
            date: today,
            lastDoneBy: ''
          };
          return acc;
        }, {}),
        binQueue: [...DEFAULT_USERS],
        lastBinCompletedBy: '',
        lastBinCompletedOn: '',
        updatedAt: new Date().toISOString()
      };
    }

    let db;
    let state = createInitialState();

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function countActiveTasks() {
      return Object.keys(state.cleaningQueues || {}).length + 1;
    }

    function getNextBinsPerson() {
      return state.binQueue?.[0] || '—';
    }

    async function saveData(nextData) {
      const ref = doc(db, ...DOC_PATH);
      const payload = { ...nextData, updatedAt: new Date().toISOString() };
      await setDoc(ref, payload);
    }

    async function completeCleaning(taskId, user) {
      const task = state.cleaningQueues[taskId];
      const newQueue = [...task.queue.filter((u) => u !== user), user];
      await saveData({
        ...state,
        cleaningQueues: {
          ...state.cleaningQueues,
          [taskId]: {
            ...task,
            queue: newQueue,
            lastDoneBy: user,
            date: formatDateInputValue(new Date())
          }
        }
      });
    }

    async function updateCleaningDate(taskId, value) {
      await saveData({
        ...state,
        cleaningQueues: {
          ...state.cleaningQueues,
          [taskId]: {
            ...state.cleaningQueues[taskId],
            date: value
          }
        }
      });
    }

    async function completeBins(user) {
      const newQueue = [...state.binQueue.filter((name) => name !== user), user];
      await saveData({
        ...state,
        binQueue: newQueue,
        lastBinCompletedBy: user,
        lastBinCompletedOn: formatDate(new Date())
      });
    }

    async function resetWeek() {
      const enteredName = window.prompt('Enter admin name to reset all queues:');
      if (enteredName !== ADMIN_NAME) {
        window.alert('Only the admin can reset the queues.');
        return;
      }

      const enteredPin = window.prompt('Enter your reset PIN:');
      if (enteredPin !== RESET_PIN) {
        window.alert('Incorrect PIN. Reset cancelled.');
        return;
      }

      const confirmed = window.confirm('Reset all queues and set dates to today?');
      if (!confirmed) return;
      await saveData(createInitialState());
    }

    function renderQueueItem({ name, index, inputName, action, taskId = '', nextLabel = 'Next in line' }) {
      const next = index === 0;
      return `
        <label class="queue-item ${next ? 'next-up' : ''}">
          <div class="person">
            <div class="rank">${index + 1}</div>
            <div>
              <div class="person-name">${escapeHtml(name)}</div>
              ${next ? `<div class="next-badge">● ${escapeHtml(nextLabel)}</div>` : `<div class="helper">Moves to the bottom after completion</div>`}
            </div>
          </div>
          <div class="radio-wrap">
            <span class="radio-ui"></span>
            <input
              type="radio"
              name="${escapeHtml(inputName)}"
              data-action="${escapeHtml(action)}"
              ${taskId ? `data-task-id="${escapeHtml(taskId)}"` : ''}
              data-user="${escapeHtml(name)}"
            />
          </div>
        </label>
      `;
    }

    function render() {
      const weekStartDate = new Date(state.weekStart);
      const cleaningHtml = Object.entries(state.cleaningQueues).map(([taskId, task], idx) => {
        const colorClass = idx % 3 === 0 ? 'icon-blue' : idx % 3 === 1 ? 'icon-green' : 'icon-amber';
        const queueHtml = task.queue.map((user, index) => renderQueueItem({
          name: user,
          index,
          inputName: `cleaning-${taskId}`,
          action: 'cleaning',
          taskId,
          nextLabel: 'Next for this task'
        })).join('');

        return `
          <section class="panel">
            <div class="panel-head">
              <div class="panel-title-wrap">
                <div class="icon-chip ${colorClass}">${escapeHtml(task.icon || '🧽')}</div>
                <div>
                  <h2>${escapeHtml(task.name)}</h2>
                  <div class="subtitle">Shared queue for this cleaning task</div>
                </div>
              </div>
              <div class="pill pill-success">Live</div>
            </div>

            <div class="date-wrap">
              <div class="date-label">Date</div>
              <input type="date" value="${escapeHtml(task.date)}" data-action="date" data-task-id="${escapeHtml(taskId)}" />
            </div>

            <div class="queue-list">${queueHtml}</div>

            ${task.lastDoneBy ? `
              <div class="last-line">
                <span>Last completed by <strong>${escapeHtml(task.lastDoneBy)}</strong></span>
                <span>${escapeHtml(task.date)}</span>
              </div>
            ` : ''}
          </section>
        `;
      }).join('');

      const binsHtml = state.binQueue.map((user, index) => renderQueueItem({
        name: user,
        index,
        inputName: 'bins',
        action: 'bins',
        nextLabel: 'Next for bins'
      })).join('');

      appEl.innerHTML = `
        <section class="hero">
          <div class="hero-top">
            <div>
              <div class="eyebrow"><span class="dot"></span> Shared live tracker</div>
              <h1>Household Cleaning Queue</h1>
              <div class="hero-sub">A clean, shared system for weekly chores, dates, and fair rotation across the house.</div>
            </div>
          </div>
          <div class="hero-meta">
            <div class="stat">
              <div class="stat-label">Current week</div>
              <div class="stat-value">${weekRangeLabel(weekStartDate)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Next for bins</div>
              <div class="stat-value">${escapeHtml(getNextBinsPerson())}</div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title-wrap">
              <div class="icon-chip icon-blue">📋</div>
              <div>
                <h2>Overview</h2>
                <div class="subtitle">Everyone follows the same live queue</div>
              </div>
            </div>
            <div class="pill pill-accent">${countActiveTasks()} queues</div>
          </div>
        </section>

        ${cleaningHtml}

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title-wrap">
              <div class="icon-chip icon-amber">🗑️</div>
              <div>
                <h2>Bins Queue</h2>
                <div class="subtitle">Whoever completes bins moves to the bottom</div>
              </div>
            </div>
            <div class="pill pill-success">Fair rotation</div>
          </div>
          <div class="queue-list">${binsHtml}</div>
          ${state.lastBinCompletedBy ? `
            <div class="last-line">
              <span>Last completed by <strong>${escapeHtml(state.lastBinCompletedBy)}</strong></span>
              <span>${escapeHtml(state.lastBinCompletedOn || '')}</span>
            </div>
          ` : ''}
        </section>

        <div class="footer-actions">
          <button class="reset-btn" id="resetBtn">Admin reset all queues for today</button>
          <div class="note">Any update made here is shared live with everyone using the same link. Reset is restricted to the admin only.</div>
        </div>
      `;

      document.querySelectorAll('input[data-action="cleaning"]').forEach((el) => {
        el.addEventListener('change', (e) => completeCleaning(e.target.dataset.taskId, e.target.dataset.user));
      });

      document.querySelectorAll('input[data-action="bins"]').forEach((el) => {
        el.addEventListener('change', (e) => completeBins(e.target.dataset.user));
      });

      document.querySelectorAll('input[data-action="date"]').forEach((el) => {
        el.addEventListener('change', (e) => updateCleaningDate(e.target.dataset.taskId, e.target.value));
      });

      document.getElementById('resetBtn').addEventListener('click', resetWeek);
    }

    try {
      const firebaseApp = initializeApp(firebaseConfig);
      db = getFirestore(firebaseApp);
      const ref = doc(db, ...DOC_PATH);

      onSnapshot(ref, async (snapshot) => {
        if (snapshot.exists()) {
          state = snapshot.data();
        } else {
          state = createInitialState();
          await setDoc(ref, state);
        }
        render();
      });
    } catch (error) {
      appEl.innerHTML = `
        <section class="panel">
          <h2>Setup needed</h2>
          <div class="subtitle">Add your Firebase config in the HTML file before deploying.</div>
          <div class="last-line" style="margin-top:12px;">${escapeHtml(error.message || 'Unknown error')}</div>
        </section>
      `;
    }
  </script>
</body>
</html>
